<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
    </head>
    <body>
        <header>
            <img src="Friends.PNG" alt="Friend Zone Image" width="100%" height="200">
            <h1 align="center">Friendship Zone</h1>
        </header>
        <h2>Add your details to register</h2>
        <form action="registrationconfirmation.html">
            <label for="name"><b>Name:</b></label>
            <input type="text" id="name" name="name" placeholder="Enter your name" pattern="[A-Za-z ]{3,}" required><br><br>

            <label for="mail"><b>Email:</b></label>
            <input type="email" id="mail" name="mail" required><br><br>

            <label for="age"><b>Age:</b></label>
            <input type="number" id="age" name="age" min="18" required><br><br>
            
            <label for="dob"><b>Birth Day:</b></label>
            <input type="date" id="dob" name="dob" required><br><br>
            
            <label><b>Gender:</b></label>
            <input type="radio" id="male" name="gender" required>
            <label for="male">M</label>
            <input type="radio" id="female" name="gender" required>
            <label for="female">F</label><br><br>

            <label for="about"><b>About:</b></label>
            <textarea id="about" name="about" rows="4" cols="40" required></textarea><br><br>

            <label><b>Interested in:</b></label>
            <input type="checkbox" id="friendship" name="interest" required>
            <label for="friendship">Friendship</label>
            <input type="checkbox" id="dating" name="interest" required>
            <label for="dating">Dating</label><br><br>

            <label for="attachment"><b>Attachment:</b></label>
            <input type="file" id="attachment" name="attachment" required><br><br>

            <button type="submit">Register</button>
            <button type="submit" formaction="adminregistrationconfirmation.html" formnovalidate>Register as Admin</button>
        </form>
    </body>
</html>
